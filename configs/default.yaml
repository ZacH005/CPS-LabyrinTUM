camera:
  device_index: 0
  width: 1280
  height: 800
  fps: 120
  flip_horizontal: false
  flip_vertical: false

serial:
  port: "/dev/cu.usbmodem101"
  baudrate: 500000
  timeout_s: 0.2

servo:
  yaw_channel: 0
  pitch_channel: 1
  neutral_us: 1500
  min_us: 1200
  max_us: 1800
  max_delta_us_per_command: 500
  watchdog_ms: 500

vision:
  # Reflective silver is difficult; start with bright-blob detection and tune on real frames.
  min_blob_area_px: 25
  max_blob_area_px: 5000
  threshold_value: 220
  use_otsu: false
  clahe_clip: 2.0
  morph_kernel: 5
  blur_kernel: 5
  # debug overlay for visualizing preprocessing and candidates
  debug_overlay: false
  debug_overlay_every_n: 1
  debug_start_stage: "binary"
  save_debug: false
  smoothing_alpha: 0.6

control:
  lookahead_mm: 25.0
  kp: 0.015
  kd: 0.006
  max_command: 1.0

maze:
  width_mm: 3220
  height_mm: 2820
  path_file: "configs/example_path.csv"

